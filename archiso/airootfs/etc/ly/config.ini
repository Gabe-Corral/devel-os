auto_login = true
auto_login_user = devel

# Keep Ly itself in 8-color mode and TTY palette is set via systemd unit
full_color = false

# Dracula colors for Ly UI
# In 8-color mode, use TB_* indices and actual RGB comes from TTY palette
bg = 0x0000        # TB_DEFAULT -> our P0 (#282a36) via ExecStartPre
fg = 0x0008        # TB_WHITE   -> palette slot 7 (set to #f8f8f2)
border_fg = 0x0008 # same as fg
error_bg = 0x0000  # default bg
error_fg = 0x0002  # TB_RED
cmatrix_fg = 0x0008

# Reapply TTY Dracula palette after Ly exits
term_reset_cmd = /usr/bin/tput reset; /usr/bin/printf '%b' '\e]P0282a36\e]P7f8f8f2\ec'
