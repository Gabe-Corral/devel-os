# True color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:Tc'

set -g mouse on

# Vi mode
set -g mode-keys vi

# Status bar base
set -g status-style bg=#282a36,fg=#f8f8f2
set -g message-style bg=#44475a,fg=#f8f8f2
set -g pane-border-style fg=#44475a
set -g pane-active-border-style fg=#bd93f9

# Window - inactive
setw -g window-status-format " #[bg=#282a36,fg=#6272a4]#I #[fg=#f8f8f2]#W "

# Window - active
setw -g window-status-current-format " #[bg=#44475a,fg=#bd93f9,bold]#I #[fg=#f8f8f2]#W "

# Status left / right (optional but looks clean)
set -g status-left "#[fg=#ff79c6,bold]#S "
set -g status-right "#[fg=#8be9fd]%Y-%m-%d #[fg=#50fa7b]%H:%M "
